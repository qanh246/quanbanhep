<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cảm ơn bạn 💖</title>
<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(135deg,#fffaf5,#ffe8cc,#ffd6a5);
    text-align:center;
}

.thank-box{
    background:white;
    padding:50px;
    border-radius:25px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    max-width:600px;
    animation:fadeIn 1s ease;
}

h1{
    color:#d62828;
    font-size:40px;
    margin-bottom:15px;
}

p{
    font-size:20px;
    color:#444;
    line-height:1.6;
}

button{
    margin-top:25px;
    padding:14px 28px;
    border:none;
    border-radius:15px;
    background:linear-gradient(45deg,#ffb703,#fb8500,#d62828);
    color:white;
    font-size:18px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    transform:scale(1.05);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="thank-box">
    <h1>🥮💖 Cảm Ơn Bạn!</h1>
    <p>
        Cảm ơn bạn đã dành thời gian chia sẻ cảm nhận về quán bánh ép yêu thích 🌸<br>
        Những đánh giá chân thành của bạn sẽ giúp nhiều người dễ dàng tìm được quán ngon tại Huế hơn ✨
    </p>

    <p id="shopThanks"></p>

    <button onclick="goBack()">🏠 Quay về trang chính</button>
</div>

<script>
const shopName = localStorage.getItem("lastShop") || "quán bánh ép";
document.getElementById("shopThanks").innerHTML =
    `💌 Cảm nhận của bạn về <b>${shopName}</b> đã được lưu lại thành công!`;

function goBack(){
    window.location.href = "AmThucDiaPhuong_BanhEp_Hue.html";
}
</script>

</body>
</html>
